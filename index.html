<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" type="text/css" href="./Css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400..800&family=Poppins:wght@100..900&family=Playfair+Display:wght@400..900&display=swap" rel="stylesheet">

    <style>
        span {
            color: #ffcc00;
        }

        .name {
            color: #ffcc00;
            margin: 0 5px;
            font-family: "Garamond", serif;
            font-size: 18px;
        }
        
        span {
            margin-left: 10px;
            font-weight: bold;
        }
        
        
        .nav-right p {
            transition: color 0.3s ease-in-out;
        }
        
        .nav-right p:hover {
            color: #00a8e8;
            font-size: 18px;
        }
        
        
        .logo {
            vertical-align: middle;
            width: 45px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap:10px; 
            max-width: 100%; 
            margin: 150px ; 
            align-items: center;
            justify-items: center;
        }
        
        
        
        .description {
            font-family: "Playfair Display", serif;
            font-size: 15px;
            color: #ffffff;
            display: inline-block;
            margin-right: 10px;
            margin-top: -120px;
            justify-items: center;
        }
        
        .intro-text {
            font-size: 2.5em;
            font-weight: 700;
            color: #ffcc00;
        }
        
        .sub-text {
            font-family: "Poppins", sans-serif;
            font-size: 1.2em;
            color: #ddd;
        }
        
        .profile-pic {
            display: inline-block;
            vertical-align: middle;
            width: 150px;
            justify-items: center;
        }
        
        .profile {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgb(255, 219, 15);
            transition: border 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            
        }
        
        .profile:hover {
            border: 4px solid rgb(24, 200, 240);
            cursor: pointer;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
        }
        
        @media (max-width: 768px) {
    .main {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 50px; 
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .profile-pic {
        margin: auto;
        display: flex;
        justify-content: center;
    }
    
    .description {
        margin-bottom: -15px; 
    }
}

        
    </style>
</head>
<body style="background-color: #121212;">


    <div class="nav-bar">
        <div class="nav-left">
            <img src="./Images/infinity.png" alt="Logo" class="logo left">
            <p class="name">Nisanth S</p>
            <img src=".//Images/infinity.png" alt="Logo" class="logo right">
        </div>
        <div class="nav-right">
            <p class="home">Home <span>|</span></p>
            <p class="about">About <span>|</span></p>
            <p class="resume">Resume <span>|</span></p>
            <p class="portfolio">Portfolio <span>|</span></p>
            <p class="contact">Contact Me</p>
        </div>
    </div>

    <div class="main">
        <div class="description">
            <p class="intro-text">Hello, I'm Nisanth!</p>
            <p class="sub-text">Passionate Developer | Tech Enthusiast | Software Engineer</p>
            <p class="sub-text">Welcome to my portfolio! Explore my work and skills.</p>
        </div>
        <div class="profile-pic">
            <img src="./Images/Profile.png" alt="Profile" class="profile">
        </div>
    </div>  
</body>
</html>
